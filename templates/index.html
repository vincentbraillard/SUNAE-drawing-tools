<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunae Studio - Kinetic Table Editor</title>
    
    <!-- Intégration de Fabric.js pour l'édition 2D -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
    <link rel="stylesheet" href="{{ url_with_timestamp('static/style.css') }}">
</head>
<body>

<div id="main-app">
    <!-- 1. Bannière supérieure commune -->
    <header id="top-banner">
        <button id="btn-back-menu" onclick="showTableSelection()">⬅ Changer de table</button>
        <div class="active-module-title">
            <span id="txt-active-module">Module</span> | <span id="txt-active-table">Modèle S</span>
        </div>
    </header>

    <!-- 2. Panneau de Simulation (Hidden in Text Mode) -->
    <section id="simulation-panel" class="common-panel hidden-in-text-mode">
        <h3>Simulation du parcours de la bille</h3>
        <div class="simulation-controls">
            <label for="simulation-slider">0%</label>
            <input type="range" id="simulation-slider" min="0" max="100" value="100">
            <label for="simulation-slider">100%</label>
        </div>
    </section>

    <!-- 3. Conteneur principal flexible -->
    <main id="workspace-container">
        
        <!-- Colonne de gauche : Outils contextuels -->
        <aside id="tool-sidebar">
            
            <!-- SECTION COMMUNE : Image de Fond (Hidden in Text Mode) -->
            <section id="background-image-panel" class="tool-section hidden-in-text-mode">
                <h2>Image de fond</h2>
                <div class="import-group">
                    <input type="file" id="bg-upload" accept="image/*">
                    <label for="bg-upload" class="btn-import">Importer une image</label>
                </div>
                <div class="control-group">
                    <label>Échelle: <span id="val-scale">1.0</span></label>
                    <input type="range" id="bg-scale" min="0.1" max="3" step="0.01" value="1.0">
                </div>
                <div class="control-group">
                    <label>Rotation (°): <span id="val-angle">0</span></label>
                    <input type="range" id="bg-angle" min="0" max="360" step="1" value="0">
                </div>
                <div class="control-group">
                    <label>Déplacer X: <span id="val-pan-x">0</span></label>
                    <input type="range" id="bg-pan-x" min="-500" max="500" step="1" value="0">
                </div>
                <div class="control-group">
                    <label>Déplacer Y: <span id="val-pan-y">0</span></label>
                    <input type="range" id="bg-pan-y" min="-500" max="500" step="1" value="0">
                </div>
            </section>

            <!-- SECTION : Outils Texte Automatique -->
            <section id="text-module-tools" class="tool-section module-specific active">
                <h2>Génération de Texte</h2>
                <div class="control-group">
                    <input type="text" id="text-input" placeholder="Entrez votre texte ybys">
                </div>
                <div class="info-box">
                    <span class="info-icon">i</span>
                    <p>Police Sunae : Le texte sera tracé en utilisant les lettres et chiffres continus créés sur-mesure pour la bille.</p>
                </div>
                <button id="btn-insert-text" class="btn-primary" onclick="addTextToCanvas()">➕ Insérer le texte</button>
                
                <p class="help-text">Cliquez sur le texte pour le déplacer, le redimensionner ou le tourner.</p>
                
                <div class="canvas-actions">
                    <button class="btn-danger" onclick="deleteSelectedText()">Delete selected</button>
                    <button class="btn-warning" onclick="clearCanvasTextOnly()">Tout effacer</button>
                </div>
            </section>

            <!-- SECTION : Outils Dessin Libre (Masquée par défaut) -->
            <section id="drawing-module-tools" class="tool-section module-specific">
                <h2>Dessin Libre</h2>
                <div class="draw-modes">
                    <button id="mode-freedraw" onclick="setDrawingMode('freedraw')">🖌️ Tracé Libre</button>
                    <button id="mode-lines" onclick="setDrawingMode('lines')">📏 Lignes Droites</button>
                </div>
                <div class="canvas-actions">
                    <button class="btn-danger" onclick="resetWorkspace()">🗑 Effacer tout le dessin</button>
                </div>
            </section>

        </aside>

        <!-- Colonne de droite : Zone d'édition (Canevas) -->
        <section id="canvas-panel">
            <div id="canvas-container">
                <canvas id="sunae-canvas"></canvas>
            </div>
        </section>

    </main>
</div>

<!-- Scripts JS -->
<script src="{{ url_with_timestamp('static/script.js') }}"></script>

</body>
</html>
